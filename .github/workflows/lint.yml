---
name: Lint

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        continue-on-error: true
        with:
          args: "check sources/"

      - name: Run ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check sources/"
