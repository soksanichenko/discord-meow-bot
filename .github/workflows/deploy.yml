---
name: Deploy
run-name: "${{ github.event.workflow_run.display_title || 'Manual deploy' }}"

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - production
          - development

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Trigger infra deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Send repository dispatch to infra
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const env = context.payload.inputs.environment;
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'infra',
              event_type: 'discord-meow-bot-deploy',
              client_payload: {
                sha: 'latest',
                environment: env,
              },
            });
...
