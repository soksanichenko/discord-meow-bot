---
name: Deploy
run-name: "${{ github.event.workflow_run.display_title || 'Manual deploy' }}"

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment override (leave empty to auto-detect from branch)'
        required: false
        type: choice
        options:
          - ''
          - production
          - development

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Trigger infra deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || ((github.event.workflow_run.head_branch || github.ref_name) == 'main' && 'production' || 'development') }}
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Resolve environment
        id: resolve
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.head_branch || github.ref_name }}" = "main" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Send repository dispatch to infra
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'infra',
              event_type: 'discord-meow-bot-deploy',
              client_payload: {
                sha: 'latest',
                environment: '${{ steps.resolve.outputs.env }}',
              },
            });
...
