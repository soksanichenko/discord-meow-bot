---
name: Deploy
run-name: "${{ github.event.workflow_run.display_title }}"

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  verify:
    name: Verify collaborator
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip deploy]')
    steps:
      - name: Check actor is a collaborator
        uses: actions/github-script@v9
        with:
          script: |
            const actor = context.payload.workflow_run.actor.login;
            try {
              await github.rest.repos.checkCollaborator({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
            } catch {
              core.setFailed(`${actor} is not a repository collaborator — deploy blocked`);
            }

  build:
    name: Build and push (${{ matrix.env }})
    needs: verify
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      matrix:
        include:
          - env: prod
            environment: production
          - env: dev
            environment: development
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/discord-meow-bot:${{ matrix.env }}-${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository_owner }}/discord-meow-bot:${{ matrix.env }}-latest
          build-args: |
            VITE_DISCORD_CLIENT_ID=${{ secrets.VITE_DISCORD_CLIENT_ID }}

  dispatch:
    name: Trigger infra deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Send repository dispatch to infra
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'infra',
              event_type: 'discord-meow-bot-deploy',
              client_payload: {
                sha: '${{ github.event.workflow_run.head_sha }}',
                ref: 'master',
              },
            });
...
