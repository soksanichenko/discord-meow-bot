---
name: Deploy
run-name: "${{ github.event.workflow_run.display_title || 'Manual deploy' }}"

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (leave empty to deploy both)'
        required: false
        type: choice
        options:
          - ''
          - production
          - development

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch-prod:
    name: Trigger infra deploy (prod)
    runs-on: ubuntu-latest
    environment: production
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && (inputs.environment == '' || inputs.environment == 'production'))
    steps:
      - name: Send repository dispatch to infra
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'infra',
              event_type: 'discord-meow-bot-deploy',
              client_payload: {
                sha: 'latest',
                environment: 'production',
                ref: 'main',
              },
            });

  dispatch-dev:
    name: Trigger infra deploy (dev)
    runs-on: ubuntu-latest
    environment: development
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.environment == '' || inputs.environment == 'development')
    steps:
      - name: Send repository dispatch to infra
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'infra',
              event_type: 'discord-meow-bot-deploy',
              client_payload: {
                sha: 'latest',
                environment: 'development',
                ref: 'main',
              },
            });
...
