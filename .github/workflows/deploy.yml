---
name: Deploy
run-name: "${{ github.event.workflow_run.display_title || 'Manual deploy' }}"

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA of the image to deploy (e.g. prod-abc123)'
        required: false

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Trigger infra deploy
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Send repository dispatch to infra
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const sha = '${{ inputs.sha }}' || '${{ github.event.workflow_run.head_sha }}' || '${{ github.sha }}';
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'infra',
              event_type: 'discord-meow-bot-deploy',
              client_payload: {
                sha: sha,
                ref: 'master',
              },
            });
...
