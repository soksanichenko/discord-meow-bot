---
name: Deploy
run-name: "${{ github.event.workflow_run.display_title || 'Manual deploy' }}"

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA of the image to deploy (leave empty for *-latest)'
        required: false
      environment:
        description: 'Environment to deploy (leave empty to deploy both)'
        required: false
        type: choice
        options:
          - ''
          - production
          - development

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Trigger infra deploy (${{ matrix.env }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        include:
          - env: prod
            environment: production
          - env: dev
            environment: development
    steps:
      - name: Send repository dispatch to infra
        if: >-
          inputs.environment == '' || inputs.environment == matrix.environment
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const sha = '${{ inputs.sha }}' || '${{ github.event.workflow_run.head_sha }}' || '${{ github.sha }}';
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'infra',
              event_type: 'discord-meow-bot-deploy',
              client_payload: {
                sha: sha,
                environment: '${{ matrix.environment }}',
                ref: 'master',
              },
            });
...
