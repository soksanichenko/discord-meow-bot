---
name: Deploy
run-name: "${{ github.event.workflow_run.display_title }}"

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip deploy]')
    steps:
      - name: Verify actor is a collaborator
        uses: actions/github-script@v9
        with:
          script: |
            const actor = context.payload.workflow_run.actor.login;
            try {
              await github.rest.repos.checkCollaborator({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
            } catch {
              core.setFailed(`${actor} is not a repository collaborator — deploy blocked`);
            }

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible and Infisical SDK
        run: pip install ansible infisicalsdk==1.0.16

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml
        working-directory: ansible

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run deploy
        working-directory: ansible
        env:
          INFISICAL_API_URL: ${{ vars.INFISICAL_API_URL }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: ansible-playbook -i inventories/zelgray.work -vv playbooks/deploy.yml
